server {
    listen 80;
    server_name _;

    # Laravel's public directory
    root /var/www/public;
    index index.php;

    # Serve static files directly; fallback to PHP
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP requests to the app container via PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Pass real client IP through Nginx proxy
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param SERVER_NAME $http_host;
    }

    # Block access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }

    # Max upload size for lesson images & audio files
    client_max_body_size 50M;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
